<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>會話練習系統 - 鎖定版</title>
    <!-- 使用 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
            user-select: none;
            -webkit-user-select: none;
        }
        input {
            user-select: auto;
            -webkit-user-select: auto;
        }

        /* 自訂表情選單的滾動條，讓其稍微可見但美觀 */
        #emojiPicker::-webkit-scrollbar {
            display: block;
            width: 6px;
        }
        #emojiPicker::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 8px;
        }
        #emojiPicker::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        /* 聊天氣泡的小尾巴 */
        .bubble-left::before {
            content: "";
            position: absolute;
            top: 15px;
            left: -8px;
            border-style: solid;
            border-width: 8px 10px 8px 0;
            border-color: transparent white transparent transparent;
        }
        .bubble-right::after {
            content: "";
            position: absolute;
            top: 15px;
            right: -8px;
            border-style: solid;
            border-width: 8px 0 8px 10px;
            border-color: transparent #9DE556 transparent transparent;
        }

        /* 點擊回饋動畫 */
        .touch-active:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        
        /* 訊息進場動畫 */
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-pop-in {
            animation: popIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-800 h-screen w-screen flex justify-center items-center font-sans overflow-hidden relative">

    <!-- 主容器 -->
    <div class="w-full h-full max-w-3xl sm:h-[95vh] sm:rounded-[3rem] sm:border-[12px] border-gray-900 bg-[#7BA3B8] flex flex-col relative overflow-hidden shadow-2xl">
        
        <!-- ================= 頂部標題列 ================= -->
        <header class="flex items-center justify-between px-4 py-4 md:py-5 text-white z-10 border-b border-white/10">
            <div class="flex items-center gap-3 md:gap-4 overflow-hidden">
                <!-- 返回按鈕 -->
                <svg class="w-6 h-6 md:w-8 md:h-8 touch-active cursor-pointer flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                
                <!-- 群組名稱 -->
                <div class="flex items-center gap-2 cursor-pointer touch-active truncate" onclick="renameChat()" title="點擊改名">
                    <h1 id="chatTitle" class="text-xl md:text-3xl font-bold truncate">春日部防衛隊</h1>
                    <span class="bg-white/20 text-white text-xs md:text-sm px-2 py-0.5 rounded-full" id="memberCount">3</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4 md:gap-6 flex-shrink-0">
                <!-- 載入 Icon -->
                <label class="cursor-pointer touch-active" title="載入對話紀錄">
                    <input type="file" id="uploadFile" class="hidden" accept=".json">
                    <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                </label>
                <!-- 下載/儲存 Icon -->
                <button id="downloadBtn" class="touch-active cursor-pointer" title="下載對話紀錄">
                    <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
                
                <!-- 群組人員 / 鎖定狀態 Icon -->
                <div id="memberBtn" class="touch-active cursor-pointer relative" onclick="handleMemberBtnClick()" title="選擇發言人">
                    <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                
                <!-- 漢堡選單 -->
                <svg class="w-7 h-7 md:w-9 md:h-9 touch-active cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </div>
        </header>

        <!-- ================= 聊天內容區 ================= -->
        <main id="chatBox" class="flex-1 overflow-y-auto px-4 py-2 flex flex-col gap-5 pb-4 scroll-smooth">
            <!-- 動態插入 -->
        </main>

        <!-- ================= 底部輸入區 ================= -->
        <div class="bg-[#F3F4F6] px-3 py-3 md:px-5 md:py-4 flex items-center gap-2 md:gap-3 pb-6 sm:pb-4 border-t border-gray-300 relative z-30">
            <!-- 圓圈加號 -->
            <svg class="w-7 h-7 md:w-9 md:h-9 text-gray-500 touch-active cursor-pointer flex-shrink-0 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <!-- 相機 -->
            <svg class="w-7 h-7 md:w-9 md:h-9 text-gray-500 touch-active cursor-pointer flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <!-- 圖片庫 -->
            <svg class="w-7 h-7 md:w-9 md:h-9 text-gray-500 touch-active cursor-pointer flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            
            <!-- 文字輸入框 (內含鎖定頭像提示) -->
            <div class="flex-1 bg-white rounded-full flex items-center px-2 py-1.5 md:px-3 md:py-2 border border-gray-300 shadow-sm transition-all focus-within:border-[#06C755] focus-within:ring-2 focus-within:ring-[#06C755]/20 relative">
                
                <!-- 顯示目前是誰在打字的小頭像 -->
                <div id="currentAvatarIndicator" class="w-7 h-7 md:w-9 md:h-9 rounded-full bg-gray-100 flex items-center justify-center text-sm md:text-lg flex-shrink-0 border border-gray-200 mr-2 overflow-hidden" title="目前發言身分">
                    👦
                </div>

                <input type="text" id="chatInput" class="w-full bg-transparent outline-none text-base md:text-xl" placeholder="輸入訊息...">
                
                <!-- Emoji 按鈕 -->
                <button id="emojiBtn" class="ml-1 flex-shrink-0 hover:text-yellow-500 transition-colors">
                    <svg class="w-6 h-6 md:w-8 md:h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
                
                <!-- 擴充版：表情貼圖彈出視窗 (加入高度限制與滾動條) -->
                <div id="emojiPicker" class="hidden absolute bottom-[120%] right-0 bg-white rounded-2xl shadow-xl border border-gray-200 p-3 w-72 md:w-96 h-80 overflow-y-auto z-50 animate-pop-in">
                    <div id="emojiGrid" class="grid grid-cols-6 md:grid-cols-8 gap-3 text-2xl md:text-3xl text-center"></div>
                </div>
            </div>
            
            <!-- 發送 / 麥克風按鈕 -->
            <button id="sendBtn" class="text-gray-500 hover:text-[#06C755] touch-active flex-shrink-0 p-1 transition-colors relative">
                <svg id="micIcon" class="w-7 h-7 md:w-9 md:h-9 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                <svg id="planeIcon" class="w-7 h-7 md:w-9 md:h-9 hidden text-[#06C755]" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
            </button>
        </div>

        <!-- 虛擬鍵盤容器 -->
        <div id="virtualKeyboard" class="hidden bg-[#D1D5DB] p-2 md:p-4 flex-col gap-1 md:gap-2 shadow-[inset_0_4px_6px_-1px_rgba(0,0,0,0.1)] z-20">
            <div class="flex justify-between items-center mb-1 px-1">
                <span class="text-xs text-gray-600 font-bold">注音虛擬鍵盤 (輔助拼音使用，選字建議使用系統鍵盤或語音)</span>
                <button id="vkClose" class="text-gray-700 bg-gray-200 px-3 py-1 rounded-lg shadow border border-gray-300 text-sm active:bg-gray-400">▼ 關閉</button>
            </div>
            <!-- 使用 grid-cols-11 來排版注音鍵盤 -->
            <div id="vkGrid" class="grid grid-cols-11 gap-1 md:gap-2"></div>
            <div class="grid grid-cols-4 gap-1 md:gap-2 mt-1 md:mt-2">
                <button id="vkSpace" class="col-span-3 bg-white shadow rounded-lg p-2 md:p-3 text-lg font-bold active:bg-gray-200 touch-active">空白鍵 Space</button>
                <button id="vkBksp" class="col-span-1 bg-[#9CA3AF] text-white shadow rounded-lg p-2 md:p-3 text-lg font-bold active:bg-gray-500 touch-active">⌫ 退格</button>
            </div>
        </div>

        <!-- ================= 右側滑出式角色名單側邊欄 ================= -->
        <div id="memberSidebar" class="absolute top-0 right-0 h-full w-full sm:w-80 bg-white shadow-[auto_0_25px_50px_-12px_rgba(0,0,0,0.5)] z-50 transform translate-x-full transition-transform duration-300 flex flex-col rounded-r-[2rem] sm:rounded-none">
            <!-- Sidebar Header -->
            <div class="p-4 md:p-5 border-b flex justify-between items-center bg-gray-50 rounded-tr-[2rem] sm:rounded-none">
                <h2 class="text-xl font-bold text-gray-800">名單管理</h2>
                <button onclick="closeMemberSidebar()" class="text-gray-500 hover:text-gray-800 p-1 bg-white rounded-full shadow-sm border border-gray-200 active:scale-95">
                    <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
            
            <!-- 提示說明 -->
            <div class="px-4 pt-3 pb-1 text-xs text-gray-500">
                點擊<span class="font-bold text-gray-700">頭像</span>可上傳圖片；點擊<span class="font-bold text-gray-700">名稱</span>可直接修改。鎖定後即無法變更身分。
            </div>

            <!-- 名單列表 -->
            <div id="sidebarSpeakerList" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
                <!-- Javascript 動態產生 -->
            </div>
            
            <!-- Footer: 新增按鈕 -->
            <div class="p-4 border-t bg-gray-50 pb-8 sm:pb-4">
                <button onclick="addNewSpeaker()" class="w-full py-3 md:py-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl flex items-center justify-center gap-2 transition-colors active:scale-95">
                    <span class="text-xl">➕</span> <span>新增成員</span>
                </button>
            </div>
            
            <!-- 隱藏的圖片上傳器 -->
            <input type="file" id="avatarUploader" class="hidden" accept="image/*">
        </div>
        
        <!-- 側邊欄展開時的背景遮罩 -->
        <div id="sidebarOverlay" class="absolute inset-0 bg-black/40 z-40 hidden transition-opacity" onclick="closeMemberSidebar()"></div>

    </div>

    <script>
        // ================= 狀態資料 (全域) =================
        let chatTitle = "春日部防衛隊";
        let isLocked = false; 
        
        let speakers = [
            { id: 'me', name: '我(老師)', icon: '👦', image: null, isMe: true },
            { id: 'masao', name: '正男', icon: '🍙', image: null, isMe: false, fullname: '正男 (Masao)' },
            { id: 'kazama', name: '風間', icon: '👦🏻', image: null, isMe: false, fullname: '風間 (Kazama)' }
        ];
        
        let currentSpeakerId = 'me';

        let messages = [
            { speakerId: 'masao', text: "小新，今天要出去玩嗎？", time: "08:00" },
            { speakerId: 'me', text: "好哇，我們公園見。", time: "08:02" }
        ];

        let editingAvatarSpeakerId = null; // 紀錄正在更換頭像的角色 ID

        // ================= 核心邏輯函式 =================

        function getAvatarHtml(speaker, textClass = '') {
            if (speaker.image) {
                return `<img src="${speaker.image}" class="w-full h-full object-cover">`;
            } else {
                return `<span class="${textClass}">${speaker.icon}</span>`;
            }
        }

        function init() {
            updateLockedUI();
            renderMessages();
            scrollToBottom();
        }

        function renameChat() {
            const newName = prompt("請輸入新的群組名稱：", chatTitle);
            const titleEl = document.getElementById('chatTitle');
            if (newName && newName.trim() !== "" && titleEl) {
                chatTitle = newName.trim();
                titleEl.textContent = chatTitle;
            }
        }

        function handleMemberBtnClick() {
            if (isLocked) {
                alert("🔒 身分已鎖定！\n若需更換發言角色，請重新整理網頁（關閉並重新開啟）。");
            } else {
                openMemberSidebar();
            }
        }

        function openMemberSidebar() {
            renderSidebarSpeakers();
            const sidebar = document.getElementById('memberSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if(sidebar) sidebar.classList.remove('translate-x-full');
            if(overlay) overlay.classList.remove('hidden');
        }

        function closeMemberSidebar() {
            const sidebar = document.getElementById('memberSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if(sidebar) sidebar.classList.add('translate-x-full');
            if(overlay) overlay.classList.add('hidden');
        }

        function renderSidebarSpeakers() {
            const list = document.getElementById('sidebarSpeakerList');
            if (!list) return;

            list.innerHTML = '';
            speakers.forEach(s => {
                const isSelected = s.id === currentSpeakerId;
                list.innerHTML += `
                    <div class="flex items-center gap-3 p-3 rounded-xl border ${isSelected ? 'border-[#06C755] bg-green-50 shadow-md' : 'border-gray-200 bg-white shadow-sm'} transition-colors">
                        <div class="relative w-14 h-14 flex-shrink-0 cursor-pointer group rounded-full overflow-hidden border border-gray-300 flex items-center justify-center bg-gray-100 touch-active" onclick="triggerAvatarUpload('${s.id}')" title="點擊更換頭像">
                            ${getAvatarHtml(s, 'text-3xl')}
                            <div class="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center text-white text-xs font-bold tracking-widest">更換</div>
                        </div>
                        <div class="flex-1">
                            <input type="text" class="w-full bg-transparent border-b-2 border-transparent hover:border-gray-300 focus:border-[#06C755] outline-none px-1 py-1 text-gray-800 font-bold text-lg md:text-xl transition-colors" value="${s.fullname || s.name}" onchange="updateSpeakerName('${s.id}', this.value)" title="點擊編輯名稱" placeholder="輸入名稱">
                        </div>
                        <button onclick="lockSpeaker('${s.id}')" class="flex-shrink-0 bg-[#06C755] text-white px-4 py-2 md:px-5 md:py-3 rounded-xl text-sm md:text-base font-bold hover:bg-[#05a546] active:scale-95 transition-all shadow-sm">
                            選擇
                        </button>
                    </div>
                `;
            });
        }

        function lockSpeaker(id) {
            const speaker = speakers.find(s => s.id === id);
            if (speaker && confirm(`確定要以「${speaker.fullname || speaker.name}」的身份發言嗎？\n⚠️ 鎖定後將無法再更換身分！`)) {
                currentSpeakerId = id;
                isLocked = true;
                closeMemberSidebar();
                updateLockedUI();
                const chatInput = document.getElementById('chatInput');
                if (chatInput) chatInput.focus();
            }
        }

        function addNewSpeaker() {
            const newId = 'user_' + Date.now();
            speakers.push({
                id: newId,
                name: '新成員',
                fullname: '新成員',
                icon: '👤',
                image: null,
                isMe: false 
            });
            
            const memberCountEl = document.getElementById('memberCount');
            if (memberCountEl) memberCountEl.textContent = speakers.length;
            
            renderSidebarSpeakers();
            setTimeout(() => {
                const list = document.getElementById('sidebarSpeakerList');
                if (list) list.scrollTop = list.scrollHeight;
            }, 50);
        }

        function updateSpeakerName(id, newName) {
            const speaker = speakers.find(s => s.id === id);
            if (speaker && newName.trim() !== '') {
                speaker.fullname = newName.trim();
                speaker.name = newName.trim().substring(0, 5); 
                renderMessages();
            }
        }

        function triggerAvatarUpload(id) {
            editingAvatarSpeakerId = id;
            const avatarUploader = document.getElementById('avatarUploader');
            if (avatarUploader) avatarUploader.click();
        }

        function updateLockedUI() {
            const speaker = speakers.find(s => s.id === currentSpeakerId) || speakers[0];
            const memberBtn = document.getElementById('memberBtn');
            const indicator = document.getElementById('currentAvatarIndicator');
            const memberCountEl = document.getElementById('memberCount');

            if (indicator) indicator.innerHTML = getAvatarHtml(speaker, 'text-sm md:text-lg');
            if (memberCountEl) memberCountEl.textContent = speakers.length;

            if (memberBtn) {
                if (isLocked) {
                    memberBtn.innerHTML = `<div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white flex items-center justify-center text-xl md:text-2xl shadow-sm border-[3px] border-[#06C755] bg-green-50 animate-pop-in overflow-hidden">${getAvatarHtml(speaker, '')}</div>`;
                } else {
                    memberBtn.innerHTML = `<svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>`;
                }
            }
        }

        function renderMessages() {
            const chatBox = document.getElementById('chatBox');
            if (!chatBox) return;

            chatBox.innerHTML = '';
            messages.forEach(msg => {
                const speaker = speakers.find(s => s.id === msg.speakerId) || speakers[0];
                const msgEl = document.createElement('div');
                msgEl.className = 'w-full flex animate-pop-in';

                if (speaker.isMe) {
                    msgEl.classList.add('justify-end');
                    msgEl.innerHTML = `
                        <div class="flex items-end gap-2 max-w-[85%]">
                            <span class="text-xs md:text-sm text-gray-200 mb-1">${msg.time}</span>
                            <div class="bg-[#9DE556] text-black text-lg md:text-2xl px-4 py-3 rounded-2xl relative shadow-sm bubble-right" style="word-break: break-word;">
                                ${msg.text}
                            </div>
                        </div>
                    `;
                } else {
                    msgEl.classList.add('justify-start');
                    msgEl.innerHTML = `
                        <div class="flex items-start gap-3 max-w-[85%]">
                            <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white flex items-center justify-center text-2xl flex-shrink-0 shadow-sm mt-1 border border-gray-200 overflow-hidden">
                                ${getAvatarHtml(speaker, '')}
                            </div>
                            <div class="flex flex-col gap-1">
                                <span class="text-xs md:text-sm text-white ml-1 drop-shadow-md">${speaker.fullname || speaker.name}</span>
                                <div class="flex items-end gap-2">
                                    <div class="bg-white text-black text-lg md:text-2xl px-4 py-3 rounded-2xl relative shadow-sm bubble-left" style="word-break: break-word;">
                                        ${msg.text}
                                    </div>
                                    <span class="text-xs md:text-sm text-gray-200 mb-1 flex-shrink-0">${msg.time}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                chatBox.appendChild(msgEl);
            });
        }

        function toggleSendIcon() {
            const chatInput = document.getElementById('chatInput');
            const micIcon = document.getElementById('micIcon');
            const planeIcon = document.getElementById('planeIcon');
            if (!chatInput || !micIcon || !planeIcon) return;

            if (chatInput.value.trim().length > 0) {
                micIcon.classList.add('hidden');
                planeIcon.classList.remove('hidden');
            } else {
                micIcon.classList.remove('hidden');
                planeIcon.classList.add('hidden');
            }
        }

        function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            if (!chatInput) return;
            const text = chatInput.value.trim();
            if (!text) return;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { 
                timeZone: 'Asia/Taipei',
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            const formattedText = text.replace(/\n/g, '<br>');

            messages.push({
                speakerId: currentSpeakerId,
                text: formattedText,
                time: timeStr
            });

            chatInput.value = '';
            toggleSendIcon();
            
            renderMessages();
            scrollToBottom();
            chatInput.focus();
        }

        function scrollToBottom() {
            setTimeout(() => {
                const chatBox = document.getElementById('chatBox');
                if (chatBox) chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        // ================= 事件監聽與 DOM 綁定區塊 (加入防呆保護) =================
        // 等待所有 HTML 元素讀取完成後再執行，避免 null 錯誤
        document.addEventListener('DOMContentLoaded', () => {

            // --- 檔案下載邏輯 ---
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', function() {
                    const data = { title: chatTitle, speakers: speakers, messages: messages };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${chatTitle}_對話紀錄.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
            }

            // --- 檔案上傳與頭像上傳邏輯 ---
            const uploadFile = document.getElementById('uploadFile');
            if (uploadFile) {
                uploadFile.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        try {
                            const data = JSON.parse(evt.target.result);
                            if (data.title) chatTitle = data.title;
                            if (data.speakers) speakers = data.speakers;
                            if (data.messages) messages = data.messages;
                            
                            const titleEl = document.getElementById('chatTitle');
                            const memberCountEl = document.getElementById('memberCount');
                            if (titleEl) titleEl.textContent = chatTitle;
                            if (memberCountEl) memberCountEl.textContent = speakers.length;
                            
                            isLocked = false; 
                            if(speakers.length > 0) currentSpeakerId = speakers[0].id;
                            
                            updateLockedUI();
                            renderMessages();
                            scrollToBottom();
                            alert("載入成功！學生名單與紀錄已更新。");
                        } catch(err) {
                            alert("讀取失敗：檔案格式不正確！");
                        }
                        e.target.value = '';
                    };
                    reader.readAsText(file);
                });
            }

            const avatarUploader = document.getElementById('avatarUploader');
            if (avatarUploader) {
                avatarUploader.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        const base64Image = evt.target.result;
                        const speaker = speakers.find(s => s.id === editingAvatarSpeakerId);
                        if (speaker) {
                            speaker.image = base64Image;
                            speaker.icon = ''; // 清除原本的 emoji
                            renderSidebarSpeakers();
                            renderMessages();
                            updateLockedUI();
                        }
                        avatarUploader.value = ''; 
                    };
                    reader.readAsDataURL(file); 
                });
            }

            // --- 輸入框與虛擬鍵盤邏輯 ---
            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.addEventListener('input', toggleSendIcon);
                chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
                chatInput.addEventListener('focus', () => {
                    const vk = document.getElementById('virtualKeyboard');
                    if (vk) {
                        vk.classList.remove('hidden');
                        vk.classList.add('flex');
                        scrollToBottom();
                    }
                });
            }

            const vkGrid = document.getElementById('vkGrid');
            if (vkGrid) {
                const keys = [
                    'ㄅ','ㄉ','ˇ','ˋ','ㄓ','ˊ','˙','ㄚ','ㄞ','ㄢ','ㄦ',
                    'ㄆ','ㄊ','ㄍ','ㄐ','ㄔ','ㄗ','ㄧ','ㄛ','ㄟ','ㄣ','?',
                    'ㄇ','ㄋ','ㄎ','ㄑ','ㄕ','ㄘ','ㄨ','ㄜ','ㄠ','ㄤ','!',
                    'ㄈ','ㄌ','ㄏ','ㄒ','ㄖ','ㄙ','ㄩ','ㄝ','ㄡ','ㄥ','@'
                ];
                keys.forEach(k => {
                    const btn = document.createElement('button');
                    btn.className = 'bg-white shadow rounded p-2 md:p-3 text-base md:text-xl font-bold active:bg-gray-200 touch-active';
                    btn.textContent = k;
                    btn.onclick = (e) => {
                        e.preventDefault();
                        if (chatInput) chatInput.value += k;
                        toggleSendIcon();
                    };
                    vkGrid.appendChild(btn);
                });
            }

            const vkBksp = document.getElementById('vkBksp');
            if (vkBksp) {
                vkBksp.onclick = (e) => {
                    e.preventDefault();
                    if (chatInput) chatInput.value = chatInput.value.slice(0, -1);
                    toggleSendIcon();
                };
            }

            const vkClose = document.getElementById('vkClose');
            if (vkClose) {
                vkClose.onclick = (e) => {
                    e.preventDefault();
                    const vk = document.getElementById('virtualKeyboard');
                    if (vk) {
                        vk.classList.remove('flex');
                        vk.classList.add('hidden');
                    }
                };
            }

            const vkSpace = document.getElementById('vkSpace');
            if (vkSpace) {
                vkSpace.onclick = (e) => {
                    e.preventDefault();
                    if (chatInput) chatInput.value += ' ';
                    toggleSendIcon();
                };
            }

            // --- 擴充版表情貼圖邏輯 ---
            const emojiGrid = document.getElementById('emojiGrid');
            const emojiPicker = document.getElementById('emojiPicker');
            const emojiBtn = document.getElementById('emojiBtn');
            
            if (emojiGrid && emojiPicker) {
                const emojisList = [
                    '😀','😂','🥰','😎','🥺','🤔','👍','🙏','❤️','✨','🎉','🔥','💯','❓','❗️',
                    '😃','😄','😁','😆','😅','🤣','🥲','☺️','😊','😇','🙂','🙃','😉','😌','😍',
                    '😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','🥸','🤩','🥳',
                    '😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','😢','😭','😤',
                    '😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🫣','🤭',
                    '🫢','🫡','🤫','🫠','🤥','😶','🫥','😐','🫤','😑','😬','🙄','😯','😦','😧',
                    '😮','😲','🥱','😴','🤤','😪','😮‍💨','😵','😵‍💫','🤐','🥴','🤢','🤮','🤧','😷',
                    '👋','🤚','🖐','✋','🖖','👌','🤌','🤏','✌️','🤞','🫰','🤟','🤘','🤙','👈','👉',
                    '👆','🖕','👇','☝️','👍','👎','✊','👊','🤛','🤜','👏','🙌','🫶','👐','🤲','🤝',
                    '👦','👧','👨','👩','👴','👵','👶','👱‍♂️','👱‍♀️','👨‍🦰','👩‍🦰','👮‍♂️','👮‍♀️','👷‍♂️','👷‍♀️',
                    '👩‍⚕️','👨‍⚕️','👩‍🏫','👨‍🏫','🧑‍🎓','👩‍🍳','👨‍🍳','🕵️‍♂️','🥷','🦸‍♂️','🦸‍♀️','🧙‍♂️','🧚‍♀️','🧛‍♂️','🧜‍♀️',
                    '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐻‍❄️','🐨','🐯','🦁','🐮','🐷','🐸','🐵',
                    '🐔','🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋',
                    '🍏','🍎','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥',
                    '🥝','🍅','🍆','🥑','🥦','🥬','🥒','🌽','🥕','🥔','🍠','🥐','🥯','🍞','🥖',
                    '🧀','🥚','🍳','🥞','🧇','🥓','🥩','🍗','🍖','🌭','🍔','🍟','🍕','🥪','🌮',
                    '🥗','🥘','🍝','🍜','🍲','🍛','🍣','🍱','🥟','🍤','🍙','🍚','🍘','🍢','🍡',
                    '🍧','🍨','🍦','🥧','🧁','🍰','🎂','🍮','🍭','🍬','🍫','🍿','🍩','🍪',
                    '🚗','🚕','🚙','🚌','🚎','🏎','🚓','🚑','🚒','🚐','🚚','🚛','🚜',
                    '☀️','🌤','⛅️','🌥','☁️','🌦','🌧','⛈','🌩','🌨','❄️','☃️','⛄️','🌬','💨','☔️'
                ];
                
                emojisList.forEach(e => {
                    const span = document.createElement('span');
                    span.className = 'cursor-pointer hover:scale-125 transition-transform inline-block p-1';
                    span.textContent = e;
                    span.onclick = () => {
                        if (chatInput) chatInput.value += e;
                        toggleSendIcon();
                    };
                    emojiGrid.appendChild(span);
                });

                if (emojiBtn) {
                    emojiBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        emojiPicker.classList.toggle('hidden');
                    });
                }

                document.addEventListener('click', (e) => {
                    if (!emojiPicker.contains(e.target) && emojiBtn && !emojiBtn.contains(e.target)) {
                        emojiPicker.classList.add('hidden');
                    }
                });
            }

            // --- 語音輸入與發送邏輯 (Web Speech API) ---
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            let recognition;
            
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'zh-TW';
                recognition.interimResults = false; 
                
                recognition.onstart = () => {
                    const micIcon = document.getElementById('micIcon');
                    if (micIcon) micIcon.classList.add('text-red-500', 'animate-pulse');
                    if (chatInput) chatInput.placeholder = "請開始說話...";
                };
                
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    if (chatInput) chatInput.value += transcript;
                    toggleSendIcon();
                };
                
                recognition.onend = () => {
                    const micIcon = document.getElementById('micIcon');
                    if (micIcon) micIcon.classList.remove('text-red-500', 'animate-pulse');
                    if (chatInput) chatInput.placeholder = "輸入訊息...";
                };
                
                recognition.onerror = (e) => {
                    console.error("語音辨識錯誤:", e);
                    const micIcon = document.getElementById('micIcon');
                    if (micIcon) micIcon.classList.remove('text-red-500', 'animate-pulse');
                    if (chatInput) chatInput.placeholder = "輸入訊息...";
                    if(e.error === 'not-allowed') {
                        alert("請允許使用麥克風權限才能進行語音輸入。");
                    }
                };
            }

            const sendBtn = document.getElementById('sendBtn');
            if (sendBtn) {
                sendBtn.addEventListener('click', () => {
                    if (chatInput && chatInput.value.trim().length > 0) {
                        sendMessage(); 
                    } else {
                        if (recognition) {
                            recognition.start();
                        } else {
                            alert("您的瀏覽器不支援語音輸入功能（建議使用 Chrome 或 Safari）。");
                        }
                    }
                });
            }

            // 啟動系統
            init();
        });
    </script>
</body>
</html>
