<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>會話練習系統 - 多人連線版</title>
    <!-- 使用 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
            user-select: none;
            -webkit-user-select: none;
        }
        input {
            user-select: auto;
            -webkit-user-select: auto;
        }

        #emojiPicker::-webkit-scrollbar {
            display: block;
            width: 6px;
        }
        #emojiPicker::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 8px;
        }
        #emojiPicker::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        .bubble-left::before {
            content: "";
            position: absolute;
            top: 15px;
            left: -8px;
            border-style: solid;
            border-width: 8px 10px 8px 0;
            border-color: transparent white transparent transparent;
        }
        .bubble-right::after {
            content: "";
            position: absolute;
            top: 15px;
            right: -8px;
            border-style: solid;
            border-width: 8px 0 8px 10px;
            border-color: transparent #9DE556 transparent transparent;
        }

        .touch-active:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-pop-in {
            animation: popIn 0.2s ease-out forwards;
        }
        
        /* 連線狀態燈號 */
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .status-online { background-color: #06C755; box-shadow: 0 0 8px #06C755; }
        .status-offline { background-color: #ef4444; }
    </style>
</head>
<body class="bg-gray-800 h-screen w-screen flex justify-center items-center font-sans overflow-hidden relative">

    <!-- App 總容器 -->
    <div class="flex flex-row h-full w-full max-w-[80rem] sm:h-[95vh] justify-center sm:items-center transition-all duration-300 px-0 sm:px-4">
        
        <!-- ================= 主聊天視窗 ================= -->
        <div class="w-full h-full max-w-3xl sm:rounded-[3rem] sm:border-[12px] border-gray-900 bg-[#7BA3B8] flex flex-col relative overflow-hidden shadow-2xl shrink sm:shrink-0 z-20 transition-all duration-300">
            
            <!-- 頂部標題列 -->
            <header class="flex items-center justify-between px-4 py-4 md:py-5 text-white z-10 border-b border-white/10">
                <div class="flex items-center gap-2 md:gap-4 overflow-hidden">
                    <svg class="w-6 h-6 md:w-8 md:h-8 touch-active cursor-pointer flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    
                    <div class="flex flex-col cursor-pointer touch-active overflow-hidden" onclick="renameChat()" title="點擊改名">
                        <div class="flex items-center gap-2">
                            <h1 id="chatTitle" class="text-xl md:text-3xl font-bold truncate">春日部防衛隊</h1>
                            <span class="bg-white/20 text-white text-xs md:text-sm px-2 py-0.5 rounded-full" id="memberCount">3</span>
                        </div>
                        <div class="text-xs text-gray-200 mt-0.5 flex items-center">
                            <span id="syncStatusDot" class="status-dot status-offline"></span>
                            <span id="syncStatusText">離線 (未同步)</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3 md:gap-5 flex-shrink-0">
                    <button onclick="openQrModal()" class="touch-active cursor-pointer bg-white/20 p-1.5 md:p-2 rounded-xl hover:bg-white/30 transition-colors" title="顯示 QR Code 邀請學生">
                        <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h3v3h-3zM20 20h-3v-3h3v3zM14 17h6M17 14v6"></path></svg>
                    </button>
                    
                    <button id="downloadBtn" class="touch-active cursor-pointer" title="備份對話紀錄">
                        <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </button>
                    
                    <!-- 參與度評估按鈕 -->
                    <button onclick="openStatsModal()" class="touch-active cursor-pointer" title="參與度評估與結束">
                        <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    </button>
                    
                    <div id="memberBtn" class="touch-active cursor-pointer relative" onclick="handleMemberBtnClick()" title="選擇發言人">
                        <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    
                    <svg class="w-7 h-7 md:w-9 md:h-9 touch-active cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </div>
            </header>

            <!-- 聊天內容區 -->
            <main id="chatBox" class="flex-1 overflow-y-auto px-4 py-2 flex flex-col gap-5 pb-4 scroll-smooth">
                <!-- 動態插入 -->
            </main>

            <!-- 底部輸入區 -->
            <div class="bg-[#F3F4F6] px-3 py-3 md:px-5 md:py-4 flex items-center gap-2 md:gap-3 pb-6 sm:pb-4 border-t border-gray-300 relative z-30">
                <svg class="w-7 h-7 md:w-9 md:h-9 text-gray-500 touch-active cursor-pointer flex-shrink-0 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <svg class="w-7 h-7 md:w-9 md:h-9 text-gray-500 touch-active cursor-pointer flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <svg class="w-7 h-7 md:w-9 md:h-9 text-gray-500 touch-active cursor-pointer flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                
                <div class="flex-1 bg-white rounded-full flex items-center px-2 py-1.5 md:px-3 md:py-2 border border-gray-300 shadow-sm transition-all focus-within:border-[#06C755] focus-within:ring-2 focus-within:ring-[#06C755]/20 relative">
                    <div id="currentAvatarIndicator" class="w-7 h-7 md:w-9 md:h-9 rounded-full bg-gray-100 flex items-center justify-center text-sm md:text-lg flex-shrink-0 border border-gray-200 mr-2 overflow-hidden" title="目前發言身分">👦</div>
                    <input type="text" id="chatInput" class="w-full bg-transparent outline-none text-base md:text-xl" placeholder="輸入訊息...">
                    
                    <button id="emojiBtn" class="ml-1 flex-shrink-0 hover:text-yellow-500 transition-colors">
                        <svg class="w-6 h-6 md:w-8 md:h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </button>
                    
                    <div id="emojiPicker" class="hidden absolute bottom-[120%] right-0 bg-white rounded-2xl shadow-xl border border-gray-200 p-3 w-72 md:w-96 h-80 overflow-y-auto z-50 animate-pop-in">
                        <div id="emojiGrid" class="grid grid-cols-6 md:grid-cols-8 gap-3 text-2xl md:text-3xl text-center"></div>
                    </div>
                </div>
                
                <button id="sendBtn" class="text-gray-500 hover:text-[#06C755] touch-active flex-shrink-0 p-1 transition-colors relative">
                    <svg id="micIcon" class="w-7 h-7 md:w-9 md:h-9 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    <svg id="planeIcon" class="w-7 h-7 md:w-9 md:h-9 hidden text-[#06C755]" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>

            <!-- 虛擬鍵盤容器 (位於主視窗底部) -->
            <div id="virtualKeyboard" class="hidden bg-[#D1D5DB] p-2 md:p-4 flex-col gap-1 md:gap-2 shadow-[inset_0_4px_6px_-1px_rgba(0,0,0,0.1)] z-20">
                <div class="flex justify-between items-center mb-1 px-1">
                    <span class="text-xs text-gray-600 font-bold">注音虛擬鍵盤</span>
                    <button id="vkClose" class="text-gray-700 bg-gray-200 px-3 py-1 rounded-lg shadow border border-gray-300 text-sm active:bg-gray-400">▼ 關閉</button>
                </div>
                <div id="vkGrid" class="grid grid-cols-11 gap-1 md:gap-2"></div>
                <div class="grid grid-cols-4 gap-1 md:gap-2 mt-1 md:mt-2">
                    <button id="vkSpace" class="col-span-3 bg-white shadow rounded-lg p-2 md:p-3 text-lg font-bold active:bg-gray-200 touch-active">空白鍵 Space</button>
                    <button id="vkBksp" class="col-span-1 bg-[#9CA3AF] text-white shadow rounded-lg p-2 md:p-3 text-lg font-bold active:bg-gray-500 touch-active">⌫ 退格</button>
                </div>
            </div>
        </div>
        <!-- ================= 主聊天視窗結束 ================= -->

        <!-- ================= 並排式角色名單側邊欄 (Side-by-side Panel) ================= -->
        <div id="memberSidebar" class="fixed inset-y-0 right-0 z-50 w-full sm:relative sm:inset-auto sm:z-10 h-full sm:h-[calc(100%-24px)] sm:w-0 overflow-hidden bg-white sm:rounded-[2.25rem] flex flex-col shadow-2xl transition-all duration-300 opacity-0 translate-x-full sm:translate-x-0 sm:ml-0">
            <div class="w-full sm:w-80 h-full flex flex-col min-w-full sm:min-w-[20rem]">
                
                <div class="p-4 md:p-5 border-b flex justify-between items-center bg-gray-50 shrink-0">
                    <h2 class="text-xl font-bold text-gray-800">名單管理</h2>
                    <button onclick="closeMemberSidebar()" class="text-gray-500 hover:text-gray-800 p-1 bg-white rounded-full shadow-sm border border-gray-200 active:scale-95">
                        <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
                
                <div class="px-4 pt-3 pb-1 text-xs text-gray-500 shrink-0">
                    點擊<span class="font-bold text-gray-700">頭像</span>可上傳圖片；點擊<span class="font-bold text-gray-700">名稱</span>可直接修改。鎖定後即無法變更身分。
                </div>
                
                <div id="sidebarSpeakerList" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
                    <!-- Javascript 動態產生 -->
                </div>
                
                <div class="p-4 border-t bg-gray-50 pb-8 sm:pb-4 shrink-0">
                    <button onclick="addNewSpeaker()" class="w-full py-3 md:py-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl flex items-center justify-center gap-2 transition-colors active:scale-95">
                        <span class="text-xl">➕</span> <span>新增成員</span>
                    </button>
                </div>
                
                <input type="file" id="avatarUploader" class="hidden" accept="image/*">
            </div>
        </div>

    </div>
    <!-- App 總容器結束 -->

    <!-- ================= 彈出式遮罩與視窗 ================= -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-40 hidden transition-opacity sm:hidden" onclick="closeMemberSidebar()"></div>

    <!-- QR Code 邀請視窗 -->
    <div id="qrModal" class="fixed inset-0 bg-black/60 z-50 hidden justify-center items-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-[90%] flex flex-col items-center shadow-2xl animate-pop-in relative">
            <button onclick="closeQrModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">邀請學生加入</h2>
            <p class="text-sm text-gray-500 mb-6 text-center">請學生掃描下方 QR Code<br>即可在自己的設備上同步參與對話</p>
            
            <div class="bg-gray-100 p-4 rounded-2xl mb-6">
                <img id="qrCodeImg" src="" alt="連線 QR Code" class="w-48 h-48 object-contain">
            </div>
            
            <button onclick="copyLink()" class="w-full py-3 bg-[#06C755] hover:bg-[#05a546] text-white font-bold rounded-xl flex justify-center items-center gap-2 active:scale-95 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                複製連線網址
            </button>
        </div>
    </div>

    <!-- ================= 參與度統計與 AI 評估視窗 ================= -->
    <div id="statsModal" class="fixed inset-0 bg-black/60 z-50 hidden justify-center items-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 max-w-lg w-[90%] flex flex-col shadow-2xl animate-pop-in relative max-h-[85vh]">
            <button onclick="closeStatsModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">📊 參與度評估</h2>
            <p class="text-sm text-gray-500 mb-4 text-center">本次對話各成員的發言次數與 AI 評分</p>
            
            <div id="statsList" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-3">
                <!-- Javascript 動態產生 -->
            </div>
            
            <div class="mt-6 flex flex-col gap-3">
                <button id="aiEvalBtn" onclick="runAIEvaluation()" class="w-full py-3 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    🤖 產生 AI 智能評估與回饋
                </button>
                <div class="flex gap-3">
                    <button onclick="closeStatsModal()" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl active:scale-95 transition-all">繼續對話</button>
                    <button onclick="clearChat()" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl active:scale-95 transition-all">結束並清空</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 載入 Firebase 模組 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ================= 狀態資料 (全域) =================
        let chatTitle = "春日部防衛隊";
        let isLocked = false; 
        
        let speakers = [
            { id: 'me', name: '我(老師)', icon: '👦', image: null, isMe: true },
            { id: 'masao', name: '正男', icon: '🍙', image: null, isMe: false, fullname: '正男 (Masao)' },
            { id: 'kazama', name: '風間', icon: '👦🏻', image: null, isMe: false, fullname: '風間 (Kazama)' }
        ];
        
        let currentSpeakerId = 'me';
        let messages = [
            { speakerId: 'masao', text: "小新，今天要出去玩嗎？", time: "08:00" },
            { speakerId: 'me', text: "好哇，我們公園見。", time: "08:02" }
        ];

        let editingAvatarSpeakerId = null;
        let isCloudSyncing = false; 

        // ================= Firebase 與連線設定 =================
        let db, docRef;
        let isOnline = false;
        
        const urlParams = new URLSearchParams(window.location.search);
        let sessionId = urlParams.get('session');
        let shareUrl = window.location.href;

        if (!sessionId) {
            sessionId = Math.random().toString(36).substring(2, 9);
            try {
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?session=' + sessionId;
                shareUrl = newUrl;
                if (!window.location.href.startsWith('blob:')) {
                    window.history.replaceState({ path: newUrl }, '', newUrl);
                }
            } catch (e) {
                console.warn("無法在此環境覆寫網址，將在記憶體中維護 Session ID。");
            }
        } else {
            shareUrl = window.location.href;
        }

        async function initFirebase() {
            // =========================================================
            // ⚠️【老師請注意】若您將此程式碼發布到 GitHub Pages，
            // 必須填寫下方的 firebaseConfig 才能啟用「多人連線同步功能」！
            // 否則大電視與學生的平板之間將無法互相傳遞資料（變成離線單機版）。
            // =========================================================
            let firebaseConfig = null; // <- 請將 null 替換成您的 { apiKey: "...", projectId: "...", ... } 
            
            // 預覽環境自動注入的設定 (若無則使用上方手動設定)
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }

            if (!firebaseConfig || !firebaseConfig.apiKey) {
                console.warn("未偵測到 Firebase 雲端設定，系統將以『離線單機模式』運行。");
                updateConnectionStatus(false);
                return false; 
            }

            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);
                
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'tv-dashboard-app';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        docRef = doc(db, 'artifacts', appId, 'public', 'data', 'chatSessions', sessionId);
                        updateConnectionStatus(true);
                        setupCloudSync(); 
                    }
                });
            } catch (error) {
                console.error("Firebase 初始化失敗:", error);
                updateConnectionStatus(false);
            }
        }

        function setupCloudSync() {
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    isCloudSyncing = true; 
                    const data = docSnap.data();
                    
                    chatTitle = data.title || chatTitle;
                    speakers = data.speakers || speakers;
                    messages = data.messages || messages;

                    const titleEl = document.getElementById('chatTitle');
                    const memberCountEl = document.getElementById('memberCount');
                    if (titleEl) titleEl.textContent = chatTitle;
                    if (memberCountEl) memberCountEl.textContent = speakers.length;

                    renderMessages();
                    
                    const sidebar = document.getElementById('memberSidebar');

        window.runAIEvaluation = async function() {
            if (messages.length === 0) {
                alert("目前沒有對話紀錄可以評估喔！");
                return;
            }

            window.renderStatsList(true); 
            const evaluateBtn = document.getElementById('aiEvalBtn');
            if(evaluateBtn) {
                evaluateBtn.disabled = true;
                evaluateBtn.innerHTML = "🔄 AI 正在仔細閱讀對話紀錄...";
            }

            let transcript = messages.map(m => {
                const speaker = speakers.find(s => s.id === m.speakerId);
                const name = speaker ? (speaker.fullname || speaker.name) : "未知";
                const cleanText = m.text.replace(/<br>/g, '\n');
                return `${name} (ID: ${m.speakerId}): ${cleanText}`;
            }).join('\n');

            const apiKey = "";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const promptText = `你是一位專業的教育專家。請閱讀以下的課堂對話紀錄，評估每位學生的「對話開啟與回應的適切性」。
對話紀錄：
${transcript}

請回傳一個 JSON 陣列，對每一個有參與的學生（依據 ID）給予評估。
評分基準 (1-100分)：
- 簡單問候或簡答：70-80分。
- 能主動延續話題、有禮貌互動或適切回應：80-100分。
- 答非所問或語氣不佳：70分以下。
並請根據發言內容，給一句15字以內的繁體中文簡短回饋（例如：「回應很棒，繼續保持！」）。`;

            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: { parts: [{ text: "You are a helpful teacher. Always return valid JSON array." }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "ARRAY",
                        items: {
                            type: "OBJECT",
                            properties: {
                                id: { type: "STRING" },
                                score: { type: "INTEGER" },
                                comment: { type: "STRING" }
                            },
                            required: ["id", "score", "comment"]
                        }
                    }
                }
            };

            const fetchWithRetry = async (url, options, retries = 5) => {
                let delay = 1000;
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        return await response.json();
                    } catch (error) {
                        if (i === retries - 1) throw error;
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                    }
                }
            };

            try {
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (textResponse) {
                    const aiData = JSON.parse(textResponse);
                    
                    window.currentStatsData.forEach(s => {
                        const evalData = aiData.find(a => a.id === s.id);
                        if (evalData) {
                            s.score = evalData.score;
                            s.comment = evalData.comment;
                        } else if (s.count > 0) {
                            s.score = 75; 
                            s.comment = "有參與發言，繼續保持！";
                        } else {
                            s.score = 0;
                            s.comment = "尚未發言，下次記得多開口喔！";
                        }
                    });
                }
            } catch (error) {
                console.error("AI 評估失敗:", error);
                alert("AI 評估暫時無法連線，請稍後再試。");
            } finally {
                window.renderStatsList(false); 
                if(evaluateBtn) {
                    evaluateBtn.disabled = true; 
                    evaluateBtn.innerHTML = "✅ 評估完成";
                }
            }
        };

        function resizeImage(base64Str, maxWidth = 150, maxHeight = 150) {
            return new Promise((resolve) => {
                let img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    let canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
            });
        }

                    reader.onload = async function(evt) {
                        const base64Image = evt.target.result;
                        const resizedBase64 = await resizeImage(base64Image);
                        
                        const speaker = speakers.find(s => s.id === editingAvatarSpeakerId);

                    'ㄆ','ㄊ','ㄍ','ㄐ','ㄔ','ㄗ','ㄧ','ㄛ','ㄟ','ㄣ','?',

                    'ㄈ','ㄌ','ㄏ','ㄒ','ㄖ','ㄙ','ㄩ','ㄝ','ㄡ','ㄥ','@'

                vkClose.onclick = (e) => {
                    e.preventDefault();
                    const vk = document.getElementById('virtualKeyboard');
                    if (vk) {
                        vk.classList.remove('flex');
                        vk.classList.add('hidden');
                    }
                };
            }

            const vkSpace = document.getElementById('vkSpace');
            if (vkSpace) {
                vkSpace.onclick = (e) => {
                    e.preventDefault();
                    if (chatInput) chatInput.value += ' ';
                    toggleSendIcon();
                };
            }

            // 表情貼圖邏輯
            const emojiGrid = document.getElementById('emojiGrid');
            const emojiPicker = document.getElementById('emojiPicker');
            const emojiBtn = document.getElementById('emojiBtn');
            
            if (emojiGrid && emojiPicker) {
                const emojisList = [
                    '😀','😂','🥰','😎','🥺','🤔','👍','🙏','❤️','✨','🎉','🔥','💯','❓','❗️',
                    '😃','😄','😁','😆','😅','🤣','🥲','☺️','😊','😇','🙂','🙃','😉','😌','😍',
                    '😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','🥸','🤩','🥳',
                    '😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','😢','😭','😤',
                    '😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🫣','🤭',
                    '🫢','🫡','🤫','🫠','🤥','😶','🫥','😐','🫤','😑','😬','🙄','😯','😦','😧',
                    '😮','😲','🥱','😴','🤤','😪','😮‍💨','😵','😵‍💫','🤐','🥴','🤢','🤮','🤧','😷',
                    '👋','🤚','🖐','✋','🖖','👌','🤌','🤏','✌️','🤞','🫰','🤟','🤘','🤙','👈','👉',
                    '👆','🖕','👇','☝️','👍','👎','✊','👊','🤛','🤜','👏','🙌','🫶','👐','🤲','🤝',
                    '👦','👧','👨','👩','👴','👵','👶','👱‍♂️','👱‍♀️','👨‍🦰','👩‍🦰','👮‍♂️','👮‍♀️','👷‍♂️','👷‍♀️',
                    '👩‍⚕️','👨‍⚕️','👩‍🏫','👨‍🏫','🧑‍🎓','👩‍🍳','👨‍🍳','🕵️‍♂️','🥷','🦸‍♂️','🦸‍♀️','🧙‍♂️','🧚‍♀️','🧛‍♂️','🧜‍♀️',
                    '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐻‍❄️','🐨','🐯','🦁','🐮','🐷','🐸','🐵',
                    '🐔','🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋',
                    '🍏','🍎','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥',
                    '🥝','🍅','🍆','🥑','🥦','🥬','🥒','🌽','🥕','🥔','🍠','🥐','🥯','🍞','🥖',
                    '🧀','🥚','🍳','🥞','🧇','🥓','🥩','🍗','🍖','🌭','🍔','🍟','🍕','🥪','🌮',
                    '🥗','🥘','🍝','🍜','🍲','🍛','🍣','🍱','🥟','🍤','🍙','🍚','🍘','🍢','🍡',
                    '🍧','🍨','🍦','🥧','🧁','🍰','🎂','🍮','🍭','🍬','🍫','🍿','🍩','🍪',
                    '🚗','🚕','🚙','🚌','🚎','🏎','🚓','🚑','🚒','🚐','🚚','🚛','🚜',
                    '☀️','🌤','⛅️','🌥','☁️','🌦','🌧','⛈','🌩','🌨','❄️','☃️','⛄️','🌬','💨','☔️'
                ];
                
                emojisList.forEach(e => {
                    const span = document.createElement('span');
                    span.className = 'cursor-pointer hover:scale-125 transition-transform inline-block p-1';
                    span.textContent = e;
                    span.onclick = () => {
                        if (chatInput) chatInput.value += e;
                        toggleSendIcon();
                    };
                    emojiGrid.appendChild(span);
                });

                if (emojiBtn) {
                    emojiBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        emojiPicker.classList.toggle('hidden');
                    });
                }

                document.addEventListener('click', (e) => {
                    if (!emojiPicker.contains(e.target) && emojiBtn && !emojiBtn.contains(e.target)) {
                        emojiPicker.classList.add('hidden');
                    }
                });
            }

            // 語音輸入邏輯
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            let recognition;
            
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'zh-TW';
                recognition.interimResults = false; 
                
                recognition.onstart = () => {
                    const micIcon = document.getElementById('micIcon');
                    if (micIcon) micIcon.classList.add('text-red-500', 'animate-pulse');
                    if (chatInput) chatInput.placeholder = "請開始說話...";
                };
                
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    if (chatInput) chatInput.value += transcript;
                    toggleSendIcon();
                };
                
                recognition.onend = () => {
                    const micIcon = document.getElementById('micIcon');
                    if (micIcon) micIcon.classList.remove('text-red-500', 'animate-pulse');
                    if (chatInput) chatInput.placeholder = "輸入訊息...";
                };
                
                recognition.onerror = (e) => {
                    console.error("語音辨識錯誤:", e);
                    const micIcon = document.getElementById('micIcon');
                    if (micIcon) micIcon.classList.remove('text-red-500', 'animate-pulse');
                    if (chatInput) chatInput.placeholder = "輸入訊息...";
                    if(e.error === 'not-allowed') {
                        alert("請允許使用麥克風權限才能進行語音輸入。");
                    }
                };
            }

            const sendBtn = document.getElementById('sendBtn');
            if (sendBtn) {
                sendBtn.addEventListener('click', () => {
                    if (chatInput && chatInput.value.trim().length > 0) {
                        sendMessage(); 
                    } else {
                        if (recognition) {
                            recognition.start();
                        } else {
                            alert("您的瀏覽器不支援語音輸入功能（建議使用 Chrome 或 Safari）。");
                        }
                    }
                });
            }

            // 啟動系統
            init();
        });
    </script>
</body>
</html>
