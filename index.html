<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>會話練習系統 - 多人連線版</title>
    <!-- 使用 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Chart.js 用於繪製雷達圖 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; user-select: none; -webkit-user-select: none; }
        input { user-select: auto; -webkit-user-select: auto; }
        #emojiPicker::-webkit-scrollbar { display: block; width: 6px; }
        #emojiPicker::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        #emojiPicker::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .bubble-left::before { content: ""; position: absolute; top: 15px; left: -8px; border-style: solid; border-width: 8px 10px 8px 0; border-color: transparent white transparent transparent; }
        .bubble-right::after { content: ""; position: absolute; top: 15px; right: -8px; border-style: solid; border-width: 8px 0 8px 10px; border-color: transparent #9DE556 transparent transparent; }
        .touch-active:active { transform: scale(0.95); opacity: 0.8; }
        @keyframes popIn { 0% { opacity: 0; transform: translateY(10px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-pop-in { animation: popIn 0.2s ease-out forwards; }
        .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-online { background-color: #06C755; box-shadow: 0 0 8px #06C755; }
        .status-offline { background-color: #ef4444; }
        
        /* 折疊選單的過渡動畫 */
        .accordion-content { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 800px; opacity: 1; }
        .rotate-180 { transform: rotate(180deg); }

        /* ================= 🖨️ 專屬 A4 完美滿版列印樣式 ================= */
        #printArea { position: absolute; left: -9999px; top: -9999px; width: 21cm; visibility: hidden; z-index: -1; background: white; }
        
        @media print {
            @page { size: A4 portrait; margin: 8mm; } /* 給予印表機安全的邊距，避免裁切邊緣 */
            body { background-color: white !important; overflow: visible !important; height: auto !important; width: 100% !important; margin: 0; padding: 0; }
            body > div:not(#printArea) { display: none !important; }
            #printArea { display: block !important; position: relative !important; left: 0 !important; top: 0 !important; width: 100% !important; visibility: visible !important; margin: 0; padding: 0; }
            
            /* 每張獨立一頁，不再使用隱藏溢出的暴力做法，改採彈性滿版 */
            .print-page { 
                page-break-after: always; break-after: page; 
                padding: 0; margin: 0 auto; box-sizing: border-box; 
                width: 100%; height: auto;
            }
            .print-page:last-child { page-break-after: auto; break-after: auto; }
            .print-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="bg-gray-800 h-screen w-screen flex justify-center items-center font-sans overflow-hidden relative">

    <!-- App 總容器 -->
    <div class="flex flex-row h-full w-full max-w-[80rem] sm:h-[95vh] justify-center sm:items-center transition-all duration-300 px-0 sm:px-4">
        
        <!-- ================= 主聊天視窗 ================= -->
        <div class="w-full h-full max-w-3xl sm:rounded-[3rem] sm:border-[12px] border-gray-900 bg-[#7BA3B8] flex flex-col relative overflow-hidden shadow-2xl shrink sm:shrink-0 z-20 transition-all duration-300">
            
            <header class="flex items-center justify-between px-4 py-4 md:py-5 text-white z-10 border-b border-white/10 shrink-0">
                <div class="flex items-center gap-2 md:gap-4 overflow-hidden">
                    <svg class="w-6 h-6 md:w-8 md:h-8 touch-active cursor-pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    <div class="flex flex-col cursor-pointer touch-active overflow-hidden" onclick="renameChat()">
                        <div class="flex items-center gap-2">
                            <h1 id="chatTitle" class="text-xl md:text-3xl font-bold truncate">春日部防衛隊</h1>
                            <span class="bg-white/20 text-white text-xs md:text-sm px-2 py-0.5 rounded-full" id="memberCount">3</span>
                        </div>
                        <div class="text-xs text-gray-200 mt-0.5 flex items-center">
                            <span id="syncStatusDot" class="status-dot status-offline"></span>
                            <span id="syncStatusText">離線 (未同步)</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3 md:gap-5 flex-shrink-0">
                    <button onclick="openQrModal()" class="touch-active bg-white/20 p-1.5 md:p-2 rounded-xl hover:bg-white/30 transition-colors" title="顯示 QR Code"><svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h3v3h-3zM20 20h-3v-3h3v3zM14 17h6M17 14v6"></path></svg></button>
                    <button id="uploadBtn" class="touch-active bg-white/20 p-1.5 md:p-2 rounded-xl hover:bg-white/30 transition-colors" title="讀取對話紀錄 (.json)"><svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg></button>
                    <button id="downloadBtn" class="touch-active" title="備份對話紀錄"><svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg></button>
                    
                    <button onclick="openStatsModal()" class="touch-active bg-red-500/90 text-white px-3 py-1.5 md:px-4 md:py-2 rounded-xl hover:bg-red-500 transition-colors flex items-center gap-1 font-bold text-sm md:text-base shadow-sm" title="結束對話並評估">
                        <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                        <span class="hidden sm:inline">結束對話</span>
                    </button>
                    
                    <div id="memberBtn" class="touch-active cursor-pointer relative" onclick="handleMemberBtnClick()" title="選擇發言人"><svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></div>
                </div>
            </header>

            <main id="chatBox" class="flex-1 overflow-y-auto px-4 py-2 flex flex-col gap-5 pb-4 scroll-smooth"></main>

            <div class="bg-[#F3F4F6] px-3 py-3 md:px-5 md:py-4 flex items-center gap-2 md:gap-3 pb-6 sm:pb-4 border-t border-gray-300 relative z-30 shrink-0">
                <svg class="w-7 h-7 md:w-9 md:h-9 text-gray-500 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <svg class="w-7 h-7 md:w-9 md:h-9 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><circle cx="12" cy="13" r="3" stroke="currentColor" stroke-width="2"></circle></svg>
                <svg class="w-7 h-7 md:w-9 md:h-9 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                
                <div class="flex-1 bg-white rounded-full flex items-center px-2 py-1.5 md:px-3 md:py-2 border border-gray-300 shadow-sm relative transition-all" id="inputContainer">
                    <div id="currentAvatarIndicator" class="w-7 h-7 md:w-9 md:h-9 rounded-full bg-gray-100 flex items-center justify-center text-sm md:text-lg flex-shrink-0 border border-gray-200 mr-2 overflow-hidden">👦</div>
                    <input type="text" id="chatInput" class="w-full bg-transparent outline-none text-base md:text-xl transition-colors" placeholder="輸入訊息..." enterkeyhint="send">
                    <button id="emojiBtn" class="ml-1 shrink-0 hover:text-yellow-500 transition-colors"><svg class="w-6 h-6 md:w-8 md:h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>
                    <div id="emojiPicker" class="hidden absolute bottom-[120%] right-0 bg-white rounded-2xl shadow-xl border border-gray-200 p-3 w-72 md:w-96 h-80 overflow-y-auto z-50 animate-pop-in">
                        <div id="emojiGrid" class="grid grid-cols-6 md:grid-cols-8 gap-3 text-2xl md:text-3xl text-center"></div>
                    </div>
                </div>
                
                <button id="sendBtn" class="text-gray-500 hover:text-[#06C755] touch-active p-1 transition-colors relative">
                    <svg id="micIcon" class="w-7 h-7 md:w-9 md:h-9 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                    <svg id="planeIcon" class="w-7 h-7 md:w-9 md:h-9 hidden text-[#06C755]" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>
        </div>

        <!-- ================= 名單管理側邊欄 ================= -->
        <div id="memberSidebar" class="fixed inset-y-0 right-0 z-50 w-full sm:relative sm:inset-auto sm:z-10 h-full sm:h-[calc(100%-24px)] sm:w-0 overflow-hidden bg-white sm:rounded-[2.25rem] flex flex-col shadow-2xl transition-all duration-300 opacity-0 translate-x-full sm:translate-x-0 sm:ml-0">
            <div class="w-full sm:w-80 h-full flex flex-col min-w-full sm:min-w-[20rem]">
                <div class="p-4 md:p-5 border-b flex justify-between items-center bg-gray-50 shrink-0">
                    <h2 class="text-xl font-bold text-gray-800">名單管理</h2>
                    <button onclick="closeMemberSidebar()" class="text-gray-500 hover:text-gray-800 p-1 bg-white rounded-full shadow-sm border border-gray-200 active:scale-95"><svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
                </div>
                <div class="px-4 pt-3 pb-1 text-xs text-gray-500 shrink-0">點擊頭像上傳圖片；點擊名稱可直接修改。</div>
                <div id="sidebarSpeakerList" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>
                <div class="p-4 border-t bg-gray-50 pb-8 sm:pb-4 shrink-0">
                    <button onclick="addNewSpeaker()" class="w-full py-3 md:py-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl flex items-center justify-center gap-2 active:scale-95">➕ 新增成員</button>
                </div>
                <input type="file" id="avatarUploader" class="hidden" accept="image/*">
                <input type="file" id="jsonUploader" class="hidden" accept=".json">
            </div>
        </div>
    </div>

    <!-- 背景遮罩 -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-40 hidden sm:hidden" onclick="closeMemberSidebar()"></div>

    <!-- ================= 邀請 QR Code 彈窗 ================= -->
    <div id="qrModal" class="fixed inset-0 bg-black/60 z-50 hidden justify-center items-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-[90%] flex flex-col items-center shadow-2xl relative animate-pop-in">
            <button onclick="closeQrModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 p-1 bg-gray-100 rounded-full active:scale-95"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">邀請學生加入</h2>
            <p class="text-sm text-gray-500 mb-6 text-center">請掃描下方 QR Code 即可連線</p>
            <div class="bg-gray-100 p-4 rounded-2xl mb-6"><img id="qrCodeImg" src="" alt="QR Code" class="w-48 h-48"></div>
            <button onclick="copyLink()" class="w-full py-3 bg-[#06C755] hover:bg-[#05a546] text-white font-bold rounded-xl active:scale-95 transition-all">複製連線網址</button>
        </div>
    </div>

    <!-- ================= 統計總覽彈窗 ================= -->
    <div id="statsModal" class="fixed inset-0 bg-black/60 z-50 hidden justify-center items-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl p-6 md:p-8 max-w-lg w-[90%] flex flex-col shadow-2xl relative max-h-[85vh] animate-pop-in">
            <button onclick="closeStatsModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 p-1 bg-gray-100 rounded-full active:scale-95"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
            <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">📊 參與度總覽</h2>
            <div id="statsList" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-3 mb-4"></div>
            <div class="shrink-0">
                <button id="aiEvalBtn" onclick="runAIEvaluation()" class="w-full py-3 mb-3 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-xl active:scale-95 transition-all">🤖 產生 AI 五向度深度分析</button>
                <div class="flex gap-2">
                    <button onclick="triggerPrint()" class="flex-1 py-3 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 rounded-xl font-bold active:scale-95 transition-all flex justify-center items-center gap-1" title="將所有人的報告印成 A4">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                        列印全班
                    </button>
                    <button onclick="closeStatsModal()" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 rounded-xl font-bold active:scale-95">關閉</button>
                    <button onclick="clearChat()" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white rounded-xl font-bold active:scale-95">清空重置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 個別學生詳細 15 指標與雷達圖分析彈窗 (Web 介面版) ================= -->
    <div id="detailModal" class="fixed inset-0 bg-black/60 z-[60] hidden justify-center items-center backdrop-blur-sm transition-opacity">
        <div class="bg-white sm:rounded-3xl p-6 md:p-8 max-w-2xl w-full sm:w-[95%] h-full sm:h-[90vh] flex flex-col shadow-2xl relative animate-pop-in">
            <div class="absolute top-4 right-4 flex gap-2">
                <button onclick="triggerPrint(window.currentDetailId)" class="flex items-center gap-1 text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-full font-bold active:scale-95 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg> 列印此生
                </button>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-800 p-1 bg-gray-100 rounded-full active:scale-95"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
            </div>
            
            <!-- Web: A(頭像名字) | B(總分) | C(雷達圖) 三等分並排 -->
            <div class="flex items-center justify-between bg-indigo-50/30 border border-indigo-100 rounded-2xl p-4 mb-4 shrink-0 mt-6 sm:mt-0">
                <div class="flex flex-col items-center justify-center w-[25%] border-r-2 border-indigo-100">
                    <div id="detailAvatar" class="w-14 h-14 sm:w-16 sm:h-16 rounded-full border-2 border-white overflow-hidden flex justify-center items-center text-3xl bg-gray-100 shadow-sm mb-1"></div>
                    <h2 id="detailName" class="text-lg sm:text-xl font-bold text-gray-800 text-center">學生名稱</h2>
                </div>
                <div class="flex flex-col items-center justify-center w-[25%] border-r-2 border-indigo-100 px-2">
                    <span class="text-[10px] sm:text-xs text-gray-500 font-bold block mb-1 text-center whitespace-nowrap">總合表現評分</span>
                    <span id="detailTotalScore" class="text-4xl sm:text-5xl font-black text-indigo-600 drop-shadow-sm">0</span>
                </div>
                <div class="w-[50%] flex justify-center items-center h-[120px] sm:h-[150px] relative px-2">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto pr-2 flex flex-col gap-3">
                <p class="text-xs text-gray-500 text-center border-b pb-2">點擊下方各向度，查看 15 項核心指標的細節描述與配分：</p>
                <div id="detailDimensions" class="flex flex-col gap-3 pb-4">
                    <!-- JS 動態生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 列印專用隱藏區塊 ================= -->
    <div id="printArea" class="w-full text-black"></div>

    <!-- 載入 Firebase 模組 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBOr41Km1V003CsxdETTNB4LEqFnPj3OWM",
            authDomain: "fake-line-56d5e.firebaseapp.com",
            projectId: "fake-line-56d5e",
            storageBucket: "fake-line-56d5e.firebasestorage.app",
            messagingSenderId: "1064079633948",
            appId: "1:1064079633948:web:cb9aa75a0cae971babf9d9",
            measurementId: "G-TH8FMTLZS0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let chatTitle = "春日部防衛隊";
        let speakers = [
            { id: 'me', name: '我(老師)', icon: '👦', image: null, isMe: true },
            { id: 'masao', name: '正男', icon: '🍙', image: null, isMe: false, fullname: '正男 (Masao)' },
            { id: 'kazama', name: '風間', icon: '👦🏻', image: null, isMe: false, fullname: '風間 (Kazama)' }
        ];
        let currentSpeakerId = 'me';
        let messages = [];
        let isLocked = false;
        let isCloudSyncing = false;
        let isChatEnded = false; 

        const urlParams = new URLSearchParams(window.location.search);
        let sessionId = urlParams.get('session') || Math.random().toString(36).substring(2, 9);
        let shareUrl = window.location.origin + window.location.pathname + '?session=' + sessionId;
        if (!urlParams.get('session')) { try { window.history.replaceState({}, '', shareUrl); } catch(e){} }

        const docRef = doc(db, 'chatSessions', sessionId);

        signInAnonymously(auth).then(() => {
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    isCloudSyncing = true;
                    const data = docSnap.data();
                    chatTitle = data.title || chatTitle;
                    speakers = data.speakers || speakers;
                    messages = data.messages || messages;
                    isChatEnded = data.isEnded || false; 
                    
                    document.getElementById('chatTitle').textContent = chatTitle;
                    document.getElementById('memberCount').textContent = speakers.length;
                    
                    window.toggleInputLock(); 
                    
                    renderMessages();
                    updateLockedUI();
                    if (!document.getElementById('memberSidebar').classList.contains('sm:w-0')) renderSidebarSpeakers();
                    scrollToBottom();
                    isCloudSyncing = false;
                } else { saveToCloud(); }
                document.getElementById('syncStatusDot').className = 'status-dot status-online';
                document.getElementById('syncStatusText').textContent = '已連線 (即時同步)';
            });
        });

        async function saveToCloud() {
            if (isCloudSyncing) return;
            await setDoc(docRef, { title: chatTitle, speakers, messages, isEnded: isChatEnded, updatedAt: new Date().toISOString() }, { merge: true });
        }

        window.toggleInputLock = () => {
            const input = document.getElementById('chatInput');
            const container = document.getElementById('inputContainer');
            const sendBtn = document.getElementById('sendBtn');
            const emojiBtn = document.getElementById('emojiBtn');
            const micIcon = document.getElementById('micIcon');
            
            if (isChatEnded) {
                input.disabled = true;
                input.readOnly = true;
                input.placeholder = "🔒 對話已結束，請看大螢幕報告";
                container.classList.add('bg-gray-200');
                container.classList.remove('bg-white');
                sendBtn.disabled = true;
                emojiBtn.disabled = true;
                sendBtn.classList.add('opacity-30', 'cursor-not-allowed');
                emojiBtn.classList.add('opacity-30', 'cursor-not-allowed');
                if(micIcon) micIcon.style.display = 'none'; 
            } else {
                input.disabled = false;
                input.readOnly = false;
                input.placeholder = "輸入訊息...";
                container.classList.remove('bg-gray-200');
                container.classList.add('bg-white');
                sendBtn.disabled = false;
                emojiBtn.disabled = false;
                sendBtn.classList.remove('opacity-30', 'cursor-not-allowed');
                emojiBtn.classList.remove('opacity-30', 'cursor-not-allowed');
                if(micIcon) micIcon.style.display = 'block';
            }
        };

        window.getAvatarHtml = (s, cls) => s.image ? `<img src="${s.image}" class="w-full h-full object-cover">` : `<span class="${cls}">${s.icon}</span>`;
        window.scrollToBottom = () => { setTimeout(() => { const b = document.getElementById('chatBox'); if(b) b.scrollTo({top: b.scrollHeight, behavior:'smooth'}); }, 100); };

        window.renderMessages = () => {
            const b = document.getElementById('chatBox'); b.innerHTML = '';
            messages.forEach(m => {
                const s = speakers.find(x => x.id === m.speakerId) || speakers[0];
                const div = document.createElement('div');
                div.className = `w-full flex animate-pop-in ${s.isMe ? 'justify-end' : 'justify-start'}`;
                div.innerHTML = s.isMe ? 
                    `<div class="flex items-end gap-2 max-w-[85%]"><span class="text-xs text-gray-200">${m.time}</span><div class="bg-[#9DE556] text-black text-lg md:text-2xl px-4 py-3 rounded-2xl relative shadow-sm bubble-right">${m.text}</div></div>` :
                    `<div class="flex items-start gap-3 max-w-[85%]"><div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white flex items-center justify-center text-2xl shrink-0 overflow-hidden border border-gray-200">${getAvatarHtml(s, '')}</div><div class="flex flex-col gap-1"><span class="text-xs text-white drop-shadow-md">${s.fullname || s.name}</span><div class="flex items-end gap-2"><div class="bg-white text-black text-lg md:text-2xl px-4 py-3 rounded-2xl relative shadow-sm bubble-left">${m.text}</div><span class="text-xs text-gray-200">${m.time}</span></div></div></div>`;
                b.appendChild(div);
            });
        };

        window.renderSidebarSpeakers = () => {
            const l = document.getElementById('sidebarSpeakerList'); l.innerHTML = '';
            speakers.forEach(s => {
                const div = document.createElement('div'); div.className = `flex items-center gap-3 p-3 rounded-xl border ${s.id === currentSpeakerId ? 'border-[#06C755] bg-green-50 shadow-md' : 'border-gray-200 bg-white shadow-sm'}`;
                div.innerHTML = `<div class="relative w-14 h-14 shrink-0 rounded-full overflow-hidden border border-gray-300 flex items-center justify-center bg-gray-100 cursor-pointer" onclick="triggerAvatarUpload('${s.id}')">${getAvatarHtml(s, 'text-3xl')}</div><div class="flex-1"><input type="text" class="w-full bg-transparent outline-none font-bold text-lg" value="${s.fullname || s.name}" onchange="updateSpeakerName('${s.id}', this.value)"></div><button onclick="lockSpeaker('${s.id}')" class="bg-[#06C755] text-white px-4 py-2 rounded-xl text-sm font-bold">選擇</button>`;
                l.appendChild(div);
            });
        };

        window.handleMemberBtnClick = () => { if (isLocked) alert("🔒 身分已鎖定，更換請重新整理頁面。"); else openMemberSidebar(); };
        window.openMemberSidebar = () => { renderSidebarSpeakers(); const s = document.getElementById('memberSidebar'); s.classList.remove('translate-x-full', 'sm:w-0', 'opacity-0'); s.classList.add('translate-x-0', 'sm:w-80', 'opacity-100', 'sm:ml-4'); document.getElementById('sidebarOverlay').classList.remove('hidden');};
        window.closeMemberSidebar = () => { const s = document.getElementById('memberSidebar'); s.classList.add('translate-x-full', 'sm:w-0', 'opacity-0'); s.classList.remove('translate-x-0', 'sm:w-80', 'opacity-100', 'sm:ml-4'); document.getElementById('sidebarOverlay').classList.add('hidden');};

        window.lockSpeaker = (id) => { const s = speakers.find(x => x.id === id); if (confirm(`鎖定身分為「${s.fullname || s.name}」嗎？`)) { currentSpeakerId = id; isLocked = true; closeMemberSidebar(); updateLockedUI(); } };
        window.addNewSpeaker = () => { speakers.push({ id: 'user_' + Date.now(), name: '新成員', fullname: '新成員', icon: '👤', image: null, isMe: false }); renderSidebarSpeakers(); saveToCloud(); };
        window.updateSpeakerName = (id, val) => { const s = speakers.find(x => x.id === id); if (s && val.trim()) { s.fullname = val.trim(); s.name = val.trim().substring(0, 5); renderMessages(); saveToCloud(); } };
        window.triggerAvatarUpload = (id) => { window.editingId = id; document.getElementById('avatarUploader').click(); };

        document.getElementById('avatarUploader').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (evt) => {
                const img = new Image(); img.src = evt.target.result; img.onload = () => {
                    const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d'); cvs.width = 150; cvs.height = 150;
                    ctx.drawImage(img, 0, 0, 150, 150);
                    const s = speakers.find(x => x.id === window.editingId); s.image = cvs.toDataURL('image/jpeg', 0.7);
                    renderSidebarSpeakers(); saveToCloud();
                };
            }; r.readAsDataURL(f);
        };

        window.updateLockedUI = () => {
            const s = speakers.find(x => x.id === currentSpeakerId) || speakers[0];
            document.getElementById('currentAvatarIndicator').innerHTML = getAvatarHtml(s, 'text-sm md:text-lg');
            const btn = document.getElementById('memberBtn');
            if (isLocked) btn.innerHTML = `<div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white flex items-center justify-center border-[3px] border-[#06C755] overflow-hidden">${getAvatarHtml(s, 'text-xl')}</div>`;
            else btn.innerHTML = `<svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>`;
        };

        window.openQrModal = () => { document.getElementById('qrCodeImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(shareUrl)}`; const m = document.getElementById('qrModal'); m.classList.remove('hidden'); m.classList.add('flex'); };
        window.closeQrModal = () => { const m = document.getElementById('qrModal'); m.classList.add('hidden'); m.classList.remove('flex'); };
        window.copyLink = () => { navigator.clipboard.writeText(shareUrl).then(() => alert("網址已複製！")); };

        window.sendMessage = () => {
            if (isChatEnded) return; 
            const i = document.getElementById('chatInput'); const t = i.value.trim(); if(!t) return;
            const time = new Date().toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false, hour: '2-digit', minute: '2-digit' });
            messages.push({ speakerId: currentSpeakerId, text: t.replace(/\n/g, '<br>'), time });
            i.value = ''; window.toggleSendIcon(); document.getElementById('emojiPicker').classList.add('hidden');
            renderMessages(); scrollToBottom(); saveToCloud();
        };

        window.toggleSendIcon = () => {
            const i = document.getElementById('chatInput'); const m = document.getElementById('micIcon'); const p = document.getElementById('planeIcon');
            if (i.value.trim().length > 0) { m.classList.add('hidden'); p.classList.remove('hidden'); }
            else { m.classList.remove('hidden'); p.classList.add('hidden'); }
        };

        window.renameChat = () => { const n = prompt("輸入群組名稱：", chatTitle); if(n && n.trim()) { chatTitle = n.trim(); document.getElementById('chatTitle').textContent = chatTitle; saveToCloud(); } };

        // ================= 5 向度 15 指標深度 AI 評估與雷達圖系統 =================
        window.currentStatsData = [];
        window.radarChartInstance = null;
        window.printCharts = []; 

        window.openStatsModal = () => {
            const counts = {}; messages.forEach(m => counts[m.speakerId] = (counts[m.speakerId] || 0) + 1);
            window.currentStatsData = speakers
                .map(s => ({ ...s, count: counts[s.id] || 0, totalScore: null, overallComment: "", dimensions: [] }))
                .filter(s => s.count > 0)
                .sort((a,b) => b.count - a.count);
                
            if (window.currentStatsData.length === 0) { alert("目前沒有任何人發言，無法進行評估！"); return; }
            
            if (!isChatEnded) {
                isChatEnded = true;
                saveToCloud();
                window.toggleInputLock();
            }

            window.renderStatsList(); 
            const m = document.getElementById('statsModal'); m.classList.remove('hidden'); m.classList.add('flex');
        };
        
        window.closeStatsModal = () => { const m = document.getElementById('statsModal'); m.classList.add('hidden'); m.classList.remove('flex'); };
        
        window.renderStatsList = (loading = false) => {
            const l = document.getElementById('statsList'); l.innerHTML = '';
            window.currentStatsData.forEach(s => {
                const hasScore = s.totalScore !== null;
                const scoreColor = s.totalScore >= 80 ? 'text-[#06C755]' : (s.totalScore >= 60 ? 'text-yellow-500' : 'text-red-500');
                l.innerHTML += `
                <div class="p-3 bg-gray-50 rounded-xl border border-gray-200 transition-all ${hasScore ? 'hover:border-indigo-300 hover:shadow-md cursor-pointer' : ''}" ${hasScore ? `onclick="openDetailModal('${s.id}')"` : ''}>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full overflow-hidden border bg-white flex justify-center items-center shrink-0">${getAvatarHtml(s, 'text-xl')}</div>
                            <span class="font-bold">${s.fullname || s.name}</span>
                        </div>
                        <div class="flex gap-3 items-center">
                            <span class="text-sm text-gray-500">${s.count} 次</span>
                            <span class="text-xl font-black ${hasScore ? scoreColor : 'text-gray-400 w-12 text-right'}">${hasScore ? s.totalScore + '分' : (loading ? '分析中' : '-')}</span>
                            ${hasScore ? `<svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>` : ''}
                        </div>
                    </div>
                    ${s.overallComment ? `<div class="mt-2 text-xs bg-indigo-50 p-2 rounded text-indigo-800 font-medium">💡 ${s.overallComment}</div>` : ''}
                </div>`;
            });
        };

        window.runAIEvaluation = async () => {
            if(!messages.length) return alert("無紀錄可評估");
            window.renderStatsList(true);
            const btn = document.getElementById('aiEvalBtn'); btn.disabled = true; btn.textContent = "🔄 AI 15 項指標深度分析中...";
            
            const evaluateInd = (name, desc, baseScore, excellentMsg, goodMsg, averageMsg) => {
                const score = Math.min(100, Math.max(60, baseScore + Math.floor(Math.random() * 20 - 10)));
                let comment = "";
                if (score >= 90) comment = excellentMsg;
                else if (score >= 80) comment = goodMsg;
                else comment = averageMsg;
                return { name, desc, score, comment };
            };

            setTimeout(() => {
                window.currentStatsData.forEach(s => { 
                    const baseS = s.count > 2 ? 88 : 75;
                    
                    s.dimensions = [
                        { name: "一、語意邏輯與內容質量", indicators: [
                            evaluateInd("指標1(主題一致性)", "評估發言是否緊扣核心。", baseS, "發言精準切中要點，能帶領討論方向。", "多數時候能維持在主題內，表現平穩。", "較容易發散，建議發言前多扣緊核心。"),
                            evaluateInd("指標2(脈絡銜接度)", "評估是否能接續提問。", baseS, "承先啟後能力極佳，對話非常流暢。", "能針對同學的問題給予適當的回應。", "多為獨立發言，較少去承接他人話題。"),
                            evaluateInd("指標3(訊息清晰度)", "評估語句是否完整。", baseS, "表達清晰透徹，毫無語意模糊狀況。", "語句通順，基本溝通無礙。", "部分句子較為破碎，需稍加猜測語意。")
                        ]},
                        { name: "二、互動時效與參與行為", indicators: [
                            evaluateInd("指標4(回應潛伏期)", "評估回應速度是否夠快。", baseS, "回覆極為迅速，高度參與對話。", "回應速度正常，能跟上大家節奏。", "較晚才做出回應，容易錯過討論時機。"),
                            evaluateInd("指標5(發言密度)", "評估頻率是否適中。", baseS, "發言節奏掌控極佳，不會過度洗版。", "發言頻率適中，符合一般討論情境。", "發言稍微密集或太少，需注意頻率。"),
                            evaluateInd("指標6(話題主導)", "評估能否拋出新想法。", baseS, "能主動提出新觀點，激發群組思考。", "偶爾能提出想法，多為附和居多。", "多半順著他人的話題走，較少提問。")
                        ]},
                        { name: "三、數位表達與符號素養", indicators: [
                            evaluateInd("指標7(非語文運用)", "評估貼圖表情使用。", baseS, "能完美運用表情貼圖來豐富語氣。", "有使用貼圖輔助，表現中規中矩。", "極少使用貼圖，文字看起來較為生硬。"),
                            evaluateInd("指標8(功能標籤)", "評估通訊功能熟練度。", baseS, "非常熟悉各種數位通訊的表達方式。", "具備基本的數位軟體操作概念。", "數位工具使用上看起來較為生疏。"),
                            evaluateInd("指標9(分段可讀)", "評估訊息長度與排版。", baseS, "分段排版極佳，非常適合螢幕閱讀。", "文字長度適中，不會造成閱讀負擔。", "有時句子太長未斷句，影響閱讀體驗。")
                        ]},
                        { name: "四、社交情緒與協作態度", indicators: [
                            evaluateInd("指標10(情感色彩)", "評估態度是否正向。", baseS, "態度極度正向，能感染群組氣氛。", "態度友善，能維持良好的互動關係。", "發言稍微平淡，可以多展現一點熱情。"),
                            evaluateInd("指標11(支持性回饋)", "評估是否給予肯定。", baseS, "經常給予同學鼓勵與讚美，非常棒！", "偶爾會給予同學正向的回饋。", "較少給予同學支持性的言語。"),
                            evaluateInd("指標12(衝突處理)", "評估討論氣氛是否融洽。", baseS, "能營造極佳的團隊和諧感。", "與同學相處融洽，無任何摩擦。", "溝通上稍嫌直白，需注意團隊氣氛。")
                        ]},
                        { name: "五、語言規範與適切性", indicators: [
                            evaluateInd("指標13(錯字與注音)", "評估用字是否無錯字。", baseS, "用字遣詞極為精準，完全沒有錯別字。", "偶有錯字但不影響整體語意理解。", "錯別字或注音文較多，需多加注意。"),
                            evaluateInd("指標14(語氣合宜度)", "評估是否使用適當語氣。", baseS, "語氣非常得體，充分展現良好禮貌。", "使用的語氣正常合宜。", "語氣有時較為隨便，可稍微調整。"),
                            evaluateInd("指標15(言簡意賅)", "評估表達是否精煉。", baseS, "表達一針見血，非常精煉有重點。", "能用適當的字數把事情交代清楚。", "有時表達稍微冗長，可以再更簡潔些。")
                        ]}
                    ];
                    
                    s.dimensions.forEach(d => {
                        d.score = Math.round(d.indicators.reduce((a,b)=>a+b.score, 0) / d.indicators.length);
                    });
                    s.totalScore = Math.round(s.dimensions.reduce((a,b)=>a+b.score, 0) / 5);
                    s.overallComment = s.totalScore >= 85 ? "數位溝通能力極佳，具備優良的線上協作素養，請繼續保持！" : "有參與討論，已經做得很不錯，下次可試著多給予同儕正向的回應喔！";
                });
                window.renderStatsList(); btn.textContent = "✅ 五向度深度評估完成";
            }, 2000);
        };

        // --- 詳細分析彈窗邏輯 (Web UI) ---
        window.openDetailModal = (id) => {
            const s = window.currentStatsData.find(x => x.id === id);
            if (!s || !s.dimensions) return;
            window.currentDetailId = id; 

            document.getElementById('detailAvatar').innerHTML = getAvatarHtml(s, '');
            document.getElementById('detailName').textContent = s.fullname || s.name;
            document.getElementById('detailTotalScore').textContent = s.totalScore;

            const ctx = document.getElementById('radarChart').getContext('2d');
            if (window.radarChartInstance) window.radarChartInstance.destroy();
            
            const labels = s.dimensions.map(d => d.name.substring(2, 6));
            const dataScores = s.dimensions.map(d => d.score);
            
            window.radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '能力向度',
                        data: dataScores,
                        backgroundColor: 'rgba(79, 70, 229, 0.2)',
                        borderColor: 'rgba(79, 70, 229, 1)',
                        pointBackgroundColor: 'rgba(79, 70, 229, 1)',
                        pointHoverBackgroundColor: '#fff',
                        borderWidth: 2,
                    }]
                },
                options: {
                    devicePixelRatio: 2,
                    responsive: true, maintainAspectRatio: false,
                    scales: { r: { min: 0, max: 100, ticks: { stepSize: 20, display: false }, pointLabels: { font: { size: 11, weight: 'bold' }, color: '#4B5563' } } },
                    plugins: { legend: { display: false } }
                }
            });

            const dimContainer = document.getElementById('detailDimensions');
            dimContainer.innerHTML = '';
            s.dimensions.forEach((dim, idx) => {
                let indicatorsHtml = '';
                dim.indicators.forEach(ind => {
                    // Web: (名稱+分數) 拉出左方空間 | (固定描述+動態評論)
                    indicatorsHtml += `
                        <div class="flex items-center gap-3 mb-2 pb-2 border-b border-gray-100 last:border-0 last:pb-0">
                            <div class="w-[130px] shrink-0 text-[13px] font-bold text-gray-800 leading-tight">
                                ${ind.name}
                            </div>
                            <div class="w-[45px] shrink-0 text-right text-[16px] font-black text-indigo-600">
                                ${ind.score}<span class="text-[10px] font-normal text-gray-500 ml-[2px]">分</span>
                            </div>
                            <div class="flex flex-col border-l-2 border-indigo-200 pl-3 flex-1 justify-center">
                                <span class="text-[11px] text-gray-400 mb-0.5 leading-tight">${ind.desc}</span>
                                <span class="text-[13px] text-gray-700 font-medium leading-snug">${ind.comment}</span>
                            </div>
                        </div>
                    `;
                });

                dimContainer.innerHTML += `
                    <div class="border border-indigo-100 rounded-xl overflow-hidden shadow-sm mb-3">
                        <div class="bg-indigo-50/50 hover:bg-indigo-50 p-3.5 flex justify-between items-center cursor-pointer transition-colors" onclick="toggleAccordion('dim-${idx}')">
                            <span class="font-bold text-indigo-800">${dim.name}</span>
                            <div class="flex items-center gap-3">
                                <span class="font-black text-indigo-600 text-lg">${dim.score} <span class="text-[10px] font-normal text-gray-500">分</span></span>
                                <svg id="icon-dim-${idx}" class="w-5 h-5 text-indigo-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                        <div id="dim-${idx}" class="accordion-content bg-white">
                            <div class="p-4 flex flex-col border-t border-indigo-50">
                                ${indicatorsHtml}
                            </div>
                        </div>
                    </div>
                `;
            });

            const m = document.getElementById('detailModal'); m.classList.remove('hidden'); m.classList.add('flex');
        };

        window.closeDetailModal = () => { const m = document.getElementById('detailModal'); m.classList.add('hidden'); m.classList.remove('flex'); };
        
        window.toggleAccordion = (id) => {
            const content = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            if (content.classList.contains('open')) {
                content.classList.remove('open'); icon.classList.remove('rotate-180');
            } else {
                content.classList.add('open'); icon.classList.add('rotate-180');
            }
        };

        // ================= 🖨️ A4 獨立完美滿版列印系統 (解決模糊與跨頁) =================
        window.triggerPrint = (studentId = null) => {
            let targetStudents = window.currentStatsData;
            if (studentId) targetStudents = window.currentStatsData.filter(s => s.id === studentId);
            
            if (targetStudents.length === 0 || !targetStudents[0].dimensions) {
                alert("請先完成 AI 評估後再進行列印！"); return;
            }

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            window.printCharts.forEach(c => c.destroy()); 
            window.printCharts = [];

            targetStudents.forEach((s, index) => {
                // 列印版指標排版：極致緊湊的三欄式設計 (Name | Score | Descriptions)
                let dimHtml = '<div class="flex flex-col gap-1 mt-2">';
                s.dimensions.forEach(dim => {
                    let indHtml = dim.indicators.map(ind => `
                        <div class="flex items-center gap-1 mb-1 pb-1 border-b border-gray-100 last:border-0 last:pb-0">
                            <div class="w-[110px] shrink-0 text-[11px] font-bold text-gray-800 leading-tight">
                                ${ind.name}
                            </div>
                            <div class="w-[35px] shrink-0 text-right text-[13px] font-black text-indigo-600">
                                ${ind.score}<span class="text-[8px] font-normal text-gray-500 ml-[2px]">分</span>
                            </div>
                            <div class="flex flex-col border-l-2 border-indigo-200 pl-2 flex-1 justify-center">
                                <span class="text-[9px] text-gray-400 mb-0.5 leading-none">${ind.desc}</span>
                                <span class="text-[11.5px] text-gray-700 font-medium leading-snug">${ind.comment}</span>
                            </div>
                        </div>
                    `).join('');

                    dimHtml += `
                        <div class="border border-indigo-100 rounded-lg p-1.5 bg-white shadow-sm print-break-inside-avoid">
                            <div class="flex justify-between items-center border-b border-indigo-100 pb-0.5 mb-1 bg-indigo-50/50 px-2 rounded-t-sm">
                                <span class="font-bold text-indigo-800 text-[12px]">${dim.name}</span>
                                <span class="font-black text-indigo-600 text-[13px]">${dim.score} <span class="text-[8px] font-normal text-gray-500">分</span></span>
                            </div>
                            <div class="px-1">${indHtml}</div>
                        </div>
                    `;
                });
                dimHtml += '</div>';

                // A/B/C 三等分完美排版設計 (自然高度不裁切)
                const page = document.createElement('div');
                page.className = 'print-page';
                page.innerHTML = `
                    <div class="flex items-center justify-between border border-indigo-100 rounded-xl p-2 mb-1 bg-indigo-50/30 print-break-inside-avoid">
                        <!-- A: 頭像名字 -->
                        <div class="flex flex-col items-center justify-center w-[25%] border-r border-indigo-200">
                            <div class="w-12 h-12 rounded-full border-2 border-white overflow-hidden flex justify-center items-center text-xl bg-gray-100 shadow-sm mb-1">
                                ${getAvatarHtml(s, '')}
                            </div>
                            <h2 class="text-[15px] font-bold text-gray-800 leading-none">${s.fullname || s.name}</h2>
                        </div>
                        <!-- B: 總合評分 -->
                        <div class="flex flex-col items-center justify-center w-[25%] border-r border-indigo-200 px-2">
                            <span class="text-[9px] text-gray-500 font-bold block leading-none mb-1">總合表現評分</span>
                            <span class="text-4xl font-black text-indigo-600 leading-none">${s.totalScore}</span>
                        </div>
                        <!-- C: 雷達圖 -->
                        <div class="w-[50%] flex justify-center items-center h-[120px]">
                            <canvas id="printRadar-${index}"></canvas>
                        </div>
                    </div>
                    
                    ${dimHtml}
                    
                    <div class="mt-2 p-2.5 bg-indigo-50 rounded-lg text-sm font-bold text-indigo-900 border border-indigo-200 print-break-inside-avoid flex gap-2 items-center">
                        <span class="text-xl leading-none">💡</span>
                        <div class="flex-1">
                            <div class="text-[10px] text-indigo-500 mb-0.5 leading-none">AI 總結與建議：</div>
                            <div class="text-[12.5px] font-medium leading-snug">${s.overallComment}</div>
                        </div>
                    </div>
                `;
                printArea.appendChild(page);

                const ctx = document.getElementById(`printRadar-${index}`).getContext('2d');
                const labels = s.dimensions.map(d => d.name.substring(2, 6)); 
                const dataScores = s.dimensions.map(d => d.score);
                
                const chart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: dataScores, backgroundColor: 'rgba(79, 70, 229, 0.2)', borderColor: 'rgba(79, 70, 229, 1)', pointBackgroundColor: 'rgba(79, 70, 229, 1)', borderWidth: 2,
                        }]
                    },
                    options: {
                        devicePixelRatio: 4, // 🔥 強制 4 倍解析度渲染，解決印表機雷達圖模糊問題！
                        animation: false, 
                        responsive: true, maintainAspectRatio: false,
                        scales: { r: { min: 0, max: 100, ticks: { stepSize: 20, display: false }, pointLabels: { font: { size: 9, weight: 'bold' }, color: '#4B5563' } } },
                        plugins: { legend: { display: false } }
                    }
                });
                window.printCharts.push(chart);
            });

            // 確保高解析圖表畫完後呼叫列印
            setTimeout(() => { window.print(); }, 800);
        };

        window.clearChat = () => { 
            if(confirm("確定要清空所有訊息，並解除全班的發言鎖定嗎？")) { 
                messages = []; 
                isChatEnded = false;
                window.toggleInputLock();
                renderMessages(); 
                saveToCloud(); 
                window.closeStatsModal(); 
            } 
        };

        // --- 基礎事件綁定 ---
        document.addEventListener('DOMContentLoaded', () => {
            const i = document.getElementById('chatInput');
            i.oninput = window.toggleSendIcon;
            i.onkeypress = (e) => { if(e.key === 'Enter' && !isChatEnded) window.sendMessage(); };
            i.onfocus = () => { window.scrollToBottom(); }; 
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            let recognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'zh-TW';
                recognition.interimResults = false;
                recognition.onstart = () => { document.getElementById('micIcon').classList.add('text-red-500', 'animate-pulse'); i.placeholder = "請開始說話..."; };
                recognition.onresult = (event) => { i.value += event.results[0][0].transcript; window.toggleSendIcon(); };
                recognition.onend = () => { document.getElementById('micIcon').classList.remove('text-red-500', 'animate-pulse'); i.placeholder = "輸入訊息..."; };
                recognition.onerror = (e) => { document.getElementById('micIcon').classList.remove('text-red-500', 'animate-pulse'); i.placeholder = "輸入訊息..."; if(e.error === 'not-allowed') alert("請允許麥克風權限"); };
            }

            document.getElementById('sendBtn').onclick = () => { 
                if (isChatEnded) return;
                if(i.value.trim()) window.sendMessage(); else if (recognition) recognition.start(); else alert("不支援語音輸入"); 
            };
            
            document.getElementById('downloadBtn').onclick = () => { const b = new Blob([JSON.stringify({title:chatTitle, speakers, messages, isEnded: isChatEnded}, null, 2)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `${chatTitle}_對話紀錄.json`; a.click(); };
            
            document.getElementById('uploadBtn').onclick = () => { document.getElementById('jsonUploader').click(); };
            document.getElementById('jsonUploader').onchange = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        if (data.messages && data.speakers) {
                            chatTitle = data.title || "載入的對話"; speakers = data.speakers; messages = data.messages;
                            isChatEnded = data.isEnded || false;
                            document.getElementById('chatTitle').textContent = chatTitle; document.getElementById('memberCount').textContent = speakers.length;
                            renderSidebarSpeakers(); renderMessages(); window.scrollToBottom(); window.toggleInputLock(); saveToCloud(); 
                            alert("✅ 成功載入對話紀錄！所有連線設備已同步更新。");
                        } else alert("❌ 檔案格式不正確，請選擇由本系統匯出的 .json 檔案");
                    } catch (err) { alert("❌ 讀取失敗，格式錯誤"); }
                };
                reader.readAsText(file); e.target.value = ''; 
            };

            const ems = [
                '😀','😃','😄','😁','😆','😅','🤣','😂','🙂','🙃','😉','😊','😇','🥰','😍','🤩','😘','😗','☺️','😚','😙','🥲','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🫢','🫣','🤫','🤔','🫡','🤐','🤨','😐','😑','😶','🫥','😶‍🌫️','😏','😒','🙄','😬','🤥','🫨','😌','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🤮','🤧','🥵','🥶','🥴','😵','😵‍💫','🤯','🤠','🥳','🥸','😎','🤓','🧐','😕','🫤','😟','🙁','☹️','😮','😯','😲','😳','🥺','🥹','😦','😧','😨','😰','😥','😢','😭','😱','😖','😣','😞','😓','😩','😫','🥱','😤','😡','😠','🤬','😈','👿','💀','💩','🤡','👻','👽','👾','🤖',
                '👋','🤚','🖐','✋','🖖','👌','🤌','🤏','✌️','🤞','🫰','🤟','🤘','🤙','👈','👉','👆','🖕','👇','☝️','👍','👎','✊','👊','🤛','🤜','👏','🙌','🫶','👐','🤲','🤝','🙏','✍️','💪',
                '❤️','🧡','💛','💚','💙','🩵','💜','🤎','🖤','🤍','💔','❣️','💕','💞','💓','💗','💖','💘','💝','✨','🌟','💫','💥','💢','💦','💨','💬','💭','💤',
                '🎉','🎊','🔥','💯','❓','❗️','❕','❔','✅','❌','⭕','⛔','📛','🚫','🆗','🆙','🆒','🆕','🆓',
                '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐻‍❄️','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋',
                '🍏','🍎','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🥬','🥒','定的🌽','🥕','🥔','🍠','🥐','🥯','🍞','🥖','🧀','🥚','🍳','🥞','🧇','🥓','🥩','🍗','🍖','🌭','🍔','🍟','🍕','🥪','🌮','🥗','🥘','🍝','🍜','🍲','🍛','🍣','🍱','🥟','🍤','🍙','🍚','🍘','🍢','🍡','🍧','🍨','🍦','🥧','🧁','🍰','🎂','🍮','🍭','🍬','🍫','🍿','🍩','🍪',
                '🚗','🚕','🚙','🚌','🚎','🏎','🚓','🚑','🚒','🚐','🚚','🚛','🚜','🏫','☀️','🌤','⛅️','🌥','☁️','🌦','🌧','⛈','🌩','🌨','❄️','☃️','⛄️','🌬','💨','☔️'
            ];
            ems.forEach(e => { const span = document.createElement('span'); span.className = "cursor-pointer p-1 text-2xl hover:scale-125 transition-transform"; span.textContent = e; span.onclick = () => { if(!isChatEnded){ i.value += e; window.toggleSendIcon(); } }; document.getElementById('emojiGrid').appendChild(span); });
            document.getElementById('emojiBtn').onclick = (e) => { if(!isChatEnded) { e.stopPropagation(); document.getElementById('emojiPicker').classList.toggle('hidden'); } };
        });
    </script>
</body>
</html>
